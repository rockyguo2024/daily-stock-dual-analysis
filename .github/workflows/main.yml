name: Daily Stock Dual Analysis

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
        default: '002709'
      stock_name:
        description: '股票名称'
        required: false
        default: '天赐材料'

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      
      # Gemini 分析
      - name: Analyze with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python main.py --force-run 2>&1 > /tmp/gemini_report.txt || echo "Gemini failed" > /tmp/gemini_report.txt
          echo "===== Gemini Analysis =====" > /tmp/dual_report.txt
          tail -100 /tmp/gemini_report.txt >> /tmp/dual_report.txt
      
      # DeepSeek 分析
      - name: Analyze with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
        run: |
          python main.py --force-run 2>&1 > /tmp/deepseek_report.txt || echo "DeepSeek failed" > /tmp/deepseek_report.txt
          echo "" >> /tmp/dual_report.txt
          echo "===== DeepSeek Analysis =====" >> /tmp/dual_report.txt
          tail -100 /tmp/deepseek_report.txt >> /tmp/dual_report.txt
      
      # 飞书推送 - 修复参数过长问题
      - name: Send to Feishu
        run: |
          REPORT_CONTENT=$(cat /tmp/dual_report.txt | head -500 | sed 's/\"/\\\\\"/g' | sed ':a;N;$!ba;s/\n/\\\\n/g')
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"${REPORT_CONTENT}\"}}" \
            || echo "飞书推送失败"
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dual-analysis-report
          path: /tmp/dual_report.txt
