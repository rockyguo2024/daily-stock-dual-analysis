name: Daily Stock Dual Analysis

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
        default: '002709'
      stock_name:
        description: '股票名称'
        required: false
        default: '天赐材料'

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      
      # Gemini 分析
      - name: Analyze with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STOCK_LIST: ${{ github.event.inputs.stock_code }}
        run: |
          echo "===== Gemini Analysis =====" > /tmp/dual_report.txt
          python main.py --force-run 2>&1 | tee -a /tmp/dual_report.txt || echo "Gemini failed" >> /tmp/dual_report.txt                    
      
      # DeepSeek 分析
      - name: Analyze with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          STOCK_LIST: ${{ github.event.inputs.stock_code }}
        run: |
          echo "" >> /tmp/dual_report.txt
          echo "===== DeepSeek Analysis =====" >> /tmp/dual_report.txt
          python main.py --force-run 2>&1 | tee -a /tmp/dual_report.txt || echo "DeepSeek failed" >> /tmp/dual_report.txt                    
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dual-analysis-report
          path: /tmp/dual_report.txt
