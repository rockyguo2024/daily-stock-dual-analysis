name: Daily Stock Dual Analysis

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
        default: '002709'
      stock_name:
        description: '股票名称'
        required: false
        default: '天赐材料'
  schedule:
    # 每天早上8:30自动运行（北京时间18:30）
    - cron: '30 10 * * 1-5'

jobs:
  dual-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: |
          python dual_model_analysis.py ${{ github.event.inputs.stock_code || '002709' }} "${{ github.event.inputs.stock_name || '天赐材料' }}"          
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
